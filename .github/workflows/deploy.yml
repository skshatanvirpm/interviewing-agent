name: deploy

permissions:
  contents: read

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-hosted-services:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Wait for Render auto-deploy
        run: sleep 120

      - name: Verify hosted web routes and CORS
        run: node scripts/hosted_web_smoke_test.mjs
        env:
          API_BASE_URL: https://interviewing-agent-api-skshatanvirpm.onrender.com
          WEB_ORIGIN: https://interviewing-agent-skshatanvirpm.onrender.com
